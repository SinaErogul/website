<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SINA EROGUL</title>
  <link rel="stylesheet" href="https://use.typekit.net/ndg1wso.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: #fcf8be;
      --text: #102926;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--background);
      color: var(--text);
    }

    body {
      min-height: 100svh;
      font-family: "scale-variable", sans-serif;
    }

    main {
      width: 100%;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 4vw;
    }

    h1 {
      font-family: "scale-variable", sans-serif;
      font-variation-settings: "wdth" 125, "wght" 700;
      font-size: clamp(3.6rem, 9.1vw, 8.9rem);
      line-height: 0.78;
      letter-spacing: 0;
      white-space: nowrap;
    }

    a {
      display: inline-block;
      margin-top: clamp(1.05rem, 1.7vw, 1.65rem);
      font-family: "scale-variable", sans-serif;
      font-variation-settings: "wdth" 125, "wght" 400;
      font-size: clamp(1.8rem, 3.6vw, 4.7rem);
      line-height: 1;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 180ms ease;
    }

    a:hover,
    a:focus-visible {
      opacity: 0.72;
    }

    a:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 0.2em;
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: clamp(1rem, 2vw, 1.6rem);
      text-align: center;
      font-family: "scale-variable", sans-serif;
      font-variation-settings: "wdth" 125, "wght" 400;
      font-size: clamp(0.78rem, 0.9vw, 1rem);
      color: var(--text);
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      main {
        padding: 0 9vw;
      }

      h1 {
        font-size: clamp(1.7rem, 8.8vw, 4.2rem);
      }

      a {
        font-size: clamp(0.9rem, 4.2vw, 2.1rem);
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 8.4vw;
      }

      a {
        font-size: 4vw;
      }
    }
  </style>
</head>

<body>
  <main aria-label="Kontakt">
    <h1>SINA EROGUL</h1>
    <a href="mailto:hi@sinaerogul.com">hi@sinaerogul.com</a>
  </main>
</body>
</html>
